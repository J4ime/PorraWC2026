name: CI - Tests & Build

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Gradle wrapper
        run: gradle wrapper

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Unit Test Results
          path: 'app/build/test-results/test*/TEST-*.xml'
          reporter: java-junit

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Gradle wrapper
        run: gradle wrapper

      - name: Run regression test suite
        run: ./gradlew test --tests "com.porrawc2026.app.RegressionTestSuite" --no-daemon

      - uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Regression Test Results
          path: 'app/build/test-results/test*/TEST-*.xml'
          reporter: java-junit

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Gradle wrapper
        run: gradle wrapper

      - name: Run lint
        run: ./gradlew lint --no-daemon

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html

  build-debug:
    name: Build Debug APK
    needs: [unit-tests, regression-tests, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Gradle wrapper
        run: gradle wrapper

      - name: Assemble debug
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: PorraWC2026-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  status-check:
    name: CI Status
    needs: [unit-tests, regression-tests, lint, build-debug]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Regression: ${{ needs.regression-tests.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Build: ${{ needs.build-debug.result }}"

          if [[ "${{ needs.unit-tests.result }}" != "success" || \
                "${{ needs.regression-tests.result }}" != "success" || \
                "${{ needs.build-debug.result }}" != "success" ]]; then
            echo "CI FAILED"
            exit 1
          fi
          echo "CI PASSED"
