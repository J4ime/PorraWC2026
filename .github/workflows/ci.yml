name: CI - Tests & Build

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  tests:
    name: Unit & Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Run all tests
        run: gradle :app:test

      - uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results
          path: 'app/build/test-results/test*/TEST-*.xml'
          reporter: java-junit

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Run lint
        run: gradle :app:lint

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html

  build:
    name: Build Debug APK
    needs: [tests, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Assemble debug
        run: gradle :app:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: PorraWC2026-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  status:
    name: CI Status
    needs: [tests, lint, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Tests: ${{ needs.tests.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Build: ${{ needs.build.result }}"

          if [[ "${{ needs.tests.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" ]]; then
            echo "CI FAILED"
            exit 1
          fi
          echo "CI PASSED"
